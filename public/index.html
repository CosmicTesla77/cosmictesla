<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CosmicTesla | What's Trending Right Now</title>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1906585717244962" crossorigin="anonymous"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0f1117;
      color: #e2e4e9;
      min-height: 100vh;
    }
    header {
      background: linear-gradient(135deg, #1a1d29 0%, #0f1117 100%);
      border-bottom: 1px solid #2a2d3a;
      padding: 24px 32px;
      text-align: center;
    }
    header h1 { font-size: 2rem; font-weight: 700; color: #00d4aa; letter-spacing: 1px; }
    header p { color: #8b8fa3; margin-top: 6px; font-size: 0.95rem; }
    .date-bar { text-align: center; padding: 16px; color: #6b7080; font-size: 0.85rem; }
    .loading { text-align: center; padding: 80px 20px; color: #6b7080; font-size: 1.1rem; }
    .loading .spinner {
      width: 40px; height: 40px;
      border: 3px solid #2a2d3a; border-top: 3px solid #00d4aa;
      border-radius: 50%; animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .trends-grid { max-width: 900px; margin: 0 auto; padding: 0 20px 40px; display: flex; flex-direction: column; gap: 12px; }
    .trend-card {
      background: #1a1d29; border: 1px solid #2a2d3a; border-radius: 10px;
      padding: 20px 24px; display: flex; align-items: flex-start; gap: 16px; transition: border-color 0.2s;
    }
    .trend-card:hover { border-color: #00d4aa; }
    .rank { font-size: 1.4rem; font-weight: 700; color: #00d4aa; min-width: 36px; text-align: center; padding-top: 2px; }
    .trend-info { flex: 1; }
    .trend-title { font-size: 1.15rem; font-weight: 600; color: #f0f1f5; margin-bottom: 6px; }
    .trend-title a { color: #f0f1f5; text-decoration: none; }
    .trend-title a:hover { color: #00d4aa; }
    .trend-traffic {
      font-size: 0.8rem; color: #00d4aa; background: rgba(0, 212, 170, 0.1);
      padding: 2px 10px; border-radius: 20px; display: inline-block; margin-bottom: 10px;
    }
    .trend-news { margin-top: 8px; display: flex; flex-direction: column; gap: 4px; }
    .trend-news a { display: block; color: #a0a4b8; font-size: 0.85rem; text-decoration: underline; text-decoration-color: rgba(160,164,184,0.35); padding: 2px 0; transition: color 0.2s, text-decoration-color 0.2s; line-height: 1.35; cursor: pointer; }
    .trend-news a:hover { color: #00d4aa; text-decoration-color: rgba(0,212,170,0.5); }
    .news-label { font-size: 0.72rem; color: #555a6e; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 2px; }
    .trend-image { width: 80px; height: 80px; border-radius: 8px; object-fit: cover; flex-shrink: 0; }
    .error { text-align: center; padding: 80px 20px; color: #ff6b6b; }
    @media (max-width: 600px) {
      .trend-card { padding: 16px; }
      .trend-image { width: 60px; height: 60px; }
      header h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <header>
    <h1>CosmicTesla</h1>
    <p>Real-time trending searches across the internet</p>
  </header>
  <div class="date-bar" id="dateBar"></div>
  <div id="content">
    <div class="loading">
      <div class="spinner"></div>
      Fetching today's trends...
    </div>
  </div>
  <footer style="text-align:center;padding:24px;border-top:1px solid #2a2d3a;color:#555a6e;font-size:0.85rem;">
    <span>&copy; 2026 CosmicTesla</span>
    <a href="/about" style="color:#8b8fa3;text-decoration:none;margin:0 10px;">About</a>
    <a href="/privacy" style="color:#8b8fa3;text-decoration:none;margin:0 10px;">Privacy Policy</a>
  </footer>
  <script>
    function esc(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    async function loadTrends() {
      const content = document.getElementById('content');
      const dateBar = document.getElementById('dateBar');
      content.innerHTML = '<div class="loading"><div class="spinner"></div>Fetching trends...</div>';
      dateBar.textContent = '';
      try {
        const response = await fetch('/api/trends');
        const data = await response.json();
        if (data.error) {
          content.innerHTML = '<div class="error">Failed to load trends. Refresh to try again.</div>';
          return;
        }
        dateBar.textContent = 'Trending in the US \u2014 ' + data.date;
        let html = '<div class="trends-grid">';
        data.trends.forEach((trend, index) => {
          html += '<div class="trend-card">';
          html += '<div class="rank">' + (index + 1) + '</div>';
          html += '<div class="trend-info">';
          html += '<div class="trend-title"><a href="' + esc(trend.link) + '" target="_blank" rel="noopener">' + esc(trend.title) + '</a></div>';
          html += '<div class="trend-traffic">' + esc(trend.traffic) + ' searches</div>';
          if (trend.headlines && trend.headlines.length) {
            html += '<div class="trend-news">';
            html += '<div class="news-label">Top Headlines</div>';
            trend.headlines.forEach(h => {
              html += '<a href="' + esc(h.link) + '" target="_blank" rel="noopener">' + esc(h.title) + '</a>';
            });
            html += '</div>';
          }
          html += '</div>';
          if (trend.image) { html += '<img class="trend-image" src="' + esc(trend.image) + '" alt="' + esc(trend.title) + '" />'; }
          html += '</div>';
        });
        html += '</div>';
        content.innerHTML = html;
      } catch (err) {
        content.innerHTML = '<div class="error">Could not connect to server. Make sure CosmicTesla is running.</div>';
      }
    }
    loadTrends();
  </script>
</body>
</html>
